# Extra autostart processes
# Lock screen on boot (auto-login via SDDM, so this ensures password is required)
exec-once = hyprlock &
# Restore power mode from last session
exec-once = sleep 5 && /home/bbk/.config/omarchy/power-mode/power-mode-toggle.sh set "$(cat /home/bbk/.local/state/omarchy/power-mode 2>/dev/null || echo "default")"
# Restore bluetooth state from last session
exec-once = sleep 5 && /home/bbk/.config/omarchy/bluetooth-state.sh restore

source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
}

animations {
    enabled = false
}

image{
	monitor = 
	path = /home/bbk/Downloads/profile.jpg
	border_size = 0
	size = 100
	rounding = -1
	position = 0,0
	halign = center
	valign = center
}

input-field {
    monitor =
    size = 250, 40
    position = 0, -100
    halign = center
    valign = center
    
    dots_size = 0.2
    dots_spacing = 0.4

    inner_color = $inner_color
    outer_color = transparent
    outline_thickness = 0

    font_family = CaskaydiaMono Nerd Font
    font_color = $font_color

    placeholder_text = Enter Password
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 100
    shadow_passes = 0
    fade_on_empty = false
}

label{
	monitor =
	text = $TIME12
	font_size = 64
	font_family = CaskaydiaMono Nerd Font
    	font_color = $font_color
    	position = 0, 400
    	halign = center
    	valign = center
   	rounding = -1
}

label{
	monitor =
	text = cmd[update:60000] date +"%a, %b %d %Y" 
	font_size = 16
	font_family = CaskaydiaMono Nerd Font
	font_color = $font_color
	position = 0, 330
	halign = center
	valign = center
}

label{
	monitor =
	text = cmd[update:60000] echo "$(cat /sys/class/power_supply/BAT0/status 2>/dev/null | sed 's/Discharging/⚡/; s/Charging/🔌/; s/Full/✅/; s/Unknown/⚠/') $(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null || echo "?")%"
	font_size = 16
	font_family = CaskaydiaMono Nerd Font
	font_color = $font_color
	position = 0, 300
	halign = center
	valign = center
}

auth {
    fingerprint:enabled = true
}

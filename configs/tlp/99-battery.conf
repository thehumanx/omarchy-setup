# Aggressive battery-saving overrides for TLP
# Applied on top of defaults when TLP_PROFILE="BAT" or "SAV"

# CPU: cap max frequency further on battery
CPU_SCALING_MAX_FREQ_ON_BAT=800000
CPU_SCALING_MAX_FREQ_ON_SAV=400000

# GPU: limit max frequency on battery
INTEL_GPU_MIN_FREQ_ON_BAT=100
INTEL_GPU_MAX_FREQ_ON_BAT=400
INTEL_GPU_MIN_FREQ_ON_SAV=100
INTEL_GPU_MAX_FREQ_ON_SAV=200

# PCI Express: max power saving on battery
PCIE_ASPM_ON_BAT=powersupersave
PCIE_ASPM_ON_SAV=powersupersave

# Platform profile: force low-power on battery
PLATFORM_PROFILE_ON_BAT=low-power

# CPU energy policy: maximum power saving
CPU_ENERGY_PERF_POLICY_ON_BAT=power

# SATA: aggressive link power management
SATA_LINKPWR_ON_BAT=min_power

# Disk: more aggressive APM on battery
DISK_APM_LEVEL_ON_BAT=1 1

# Runtime PM: shorter timeout on battery
RUNTIME_PM_ON_BAT=auto
